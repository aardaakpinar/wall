profile:
  name: Wall Engine
  title: YAML-Based Bento Grid System
  description: >
    Build a fast, static Bento Grid portfolio from a single YAML file.
    Wall keeps content, layout, links, images, and theme tokens easy to edit.
  avatar: assets/img/logo.png
  socials:
    - name: github
      url: https://github.com/aardaakpinar/wall

main:
  - type: hero

  - type: links
    title: Project Links
    items:
      - name: Live Demo
        url: https://aardaakpinar.github.io/wall
        icon: bx bx-link

      - name: Repository
        url: https://github.com/aardaakpinar/wall
        icon: bxl bx-github

  - type: image
    image: assets/img/example.png
    alt: "Wall Bento Grid Preview"
    url: https://github.com/aardaakpinar/wall

  - type: title
    text: Features

  - type: projects
    items:
      - name: YAML Driven UI
        description: Everything is controlled via a single config.yaml file.
        url: https://github.com/aardaakpinar/wall
        tags:
          - YAML
          - Content

      - name: Bento Grid Engine
        description: Cards are rendered in order from the main list.
        url: https://github.com/aardaakpinar/wall
        tags:
          - Grid
          - Static

      - name: CDN Ready
        description: Use Wall from jsDelivr with only index.html and config.yaml.
        url: https://github.com/aardaakpinar/wall
        tags:
          - CDN
          - Fast

      - name: HTML Meta Control
        description: SEO and social preview tags stay in index.html for reliable sharing.
